services:
  postgres:
    image: postgres:16-alpine
    container_name: quantflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  signal_engine:
    build:
      context: .
      dockerfile: signal_engine/Dockerfile
    container_name: quantflow-signal-engine
    environment:
      SIGNAL_ENGINE_PORT: "50051"
      SIGNAL_ENGINE_WINDOW_SIZE: "20"
      SIGNAL_ENGINE_THRESHOLD: "0.02"
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; channel = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(channel).result(timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  execution_layer:
    build:
      context: .
      dockerfile: execution_layer/Dockerfile
    container_name: quantflow-execution-layer
    environment:
      EXECUTION_SERVICE_PORT: "50052"
    ports:
      - "50052:50052"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/50052' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: quantflow-orchestrator
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=quantflow;Username=postgres;Password=postgres"
      SignalService__Address: "http://signal_engine:50051"
      ExecutionService__Address: "http://execution_layer:50052"
      PriceTicker__TickIntervalMs: "1000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      signal_engine:
        condition: service_healthy
      execution_layer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quantflow-network

volumes:
  postgres_data:

networks:
  quantflow-network:
    driver: bridge

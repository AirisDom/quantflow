services:
  postgres:
    image: postgres:16-alpine
    container_name: quantflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-quantflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quantflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  signal_engine:
    build:
      context: .
      dockerfile: signal_engine/Dockerfile
    container_name: quantflow-signal-engine
    environment:
      SIGNAL_ENGINE_PORT: ${SIGNAL_ENGINE_PORT:-50051}
      SIGNAL_ENGINE_HEALTH_PORT: ${SIGNAL_ENGINE_HEALTH_PORT:-8080}
      SIGNAL_ENGINE_WINDOW_SIZE: ${SIGNAL_ENGINE_WINDOW_SIZE:-20}
      SIGNAL_ENGINE_THRESHOLD: ${SIGNAL_ENGINE_THRESHOLD:-0.02}
      SIGNAL_ENGINE_LOG_LEVEL: ${SIGNAL_ENGINE_LOG_LEVEL:-INFO}
    ports:
      - "${SIGNAL_ENGINE_PORT:-50051}:${SIGNAL_ENGINE_PORT:-50051}"
      - "${SIGNAL_ENGINE_HEALTH_PORT:-8080}:${SIGNAL_ENGINE_HEALTH_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SIGNAL_ENGINE_HEALTH_PORT:-8080}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  execution_layer:
    build:
      context: .
      dockerfile: execution_layer/Dockerfile
    container_name: quantflow-execution-layer
    environment:
      EXECUTION_SERVICE_PORT: ${EXECUTION_SERVICE_PORT:-50052}
      EXECUTION_HEALTH_PORT: ${EXECUTION_HEALTH_PORT:-8081}
      EXECUTION_MIN_LATENCY_MS: ${EXECUTION_MIN_LATENCY_MS:-10}
      EXECUTION_MAX_LATENCY_MS: ${EXECUTION_MAX_LATENCY_MS:-50}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${EXECUTION_SERVICE_PORT:-50052}:${EXECUTION_SERVICE_PORT:-50052}"
      - "${EXECUTION_HEALTH_PORT:-8081}:${EXECUTION_HEALTH_PORT:-8081}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${EXECUTION_HEALTH_PORT:-8081}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantflow-network

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: quantflow-orchestrator
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Serilog__MinimumLevel__Default: ${SERILOG_MINIMUM_LEVEL:-Information}
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-postgres};Database=${POSTGRES_DB:-quantflow};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      SignalService__Address: ${SIGNAL_SERVICE_ADDRESS:-http://signal_engine:50051}
      ExecutionService__Address: ${EXECUTION_SERVICE_ADDRESS:-http://execution_layer:50052}
      PriceTicker__TickIntervalMs: ${PRICE_TICKER_INTERVAL_MS:-1000}
      Portfolio__InitialCash: ${PORTFOLIO_INITIAL_CASH:-100000}
      Risk__MaxDrawdownPercent: ${RISK_MAX_DRAWDOWN_PERCENT:-0.05}
      Risk__MaxPositionSizePercent: ${RISK_MAX_POSITION_SIZE_PERCENT:-0.10}
      Risk__MaxExposurePercent: ${RISK_MAX_EXPOSURE_PERCENT:-0.80}
      Risk__MinOrderValue: ${RISK_MIN_ORDER_VALUE:-10}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      signal_engine:
        condition: service_healthy
      execution_layer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quantflow-network

volumes:
  postgres_data:

networks:
  quantflow-network:
    driver: bridge
